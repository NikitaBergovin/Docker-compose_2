services:
  weather-app:
    image: berg24/weather-app:latest
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}

  nginx:
    image: nginx:alpine
    ports:
      - "20021:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - weather-app

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30